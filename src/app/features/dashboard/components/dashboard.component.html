<div class="dashboard-page">

  <!-- ── Welcome banner ────────────────────────────────────────────────────── -->
  <div class="welcome-banner">
    <div class="welcome-text">
      <h1 class="welcome-title">
        Welcome back, <span class="highlight">{{ currentUser?.username ?? 'User' }}</span> 👋
      </h1>
      <p class="welcome-subtitle">
        Use the calculator below to convert, compare, or combine physical quantities.
      </p>
    </div>
    <div class="quick-actions">
      <a routerLink="/history" class="btn btn--secondary">View History</a>
    </div>
  </div>

  <!-- ── Measurement (primary content) ─────────────────────────────────────── -->
  <section id="measurement" class="dashboard-measurement" aria-label="Quantity measurement">
    <app-measurement></app-measurement>
  </section>

</div>
