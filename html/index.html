<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quantity Measurement App</title>

  <link rel="stylesheet" href="../css/auth.css" />


  <!-- Fonts used by your existing style.css -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="card">
    <div class="left">
      <h1 id="authTitle">WELCOME BACK</h1>
      <p class="subtitle" id="authSubtitle">Welcome back! Please enter your details.</p>

      <!-- LOGIN -->
      <form id="loginForm">
        <div class="form-group">
          <label for="login-username">Username</label>
          <input id="login-username" name="username" placeholder="Enter your username" autocomplete="username" required />
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <input id="login-password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>

        <button class="btn-signin" type="submit" href="/dashboard.html">Sign in</button>

        <div class="divider">
          <span>or</span>
        </div>

        <a class="btn-google" href="/dashboard.html" role="button" aria-label="Sign in with Google">
          <svg viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.2 3.6l6.86-6.86C36.05 1.99 30.5 0 24 0 14.62 0 6.48 5.44 2.32 13.39l7.98 6.2C12.44 13.02 17.87 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.5 24.5c0-1.57-.14-3.09-.41-4.55H24v9.11h12.7c-.55 2.95-2.16 5.45-4.56 7.13l7.03 5.44c4.11-3.79 6.33-9.38 6.33-17.13z"/>
            <path fill="#FBBC05" d="M10.3 28.2c-.49-1.49-.76-3.08-.76-4.7s.27-3.21.76-4.7l-7.98-6.2C.84 16.48 0 20.17 0 23.5c0 3.33.84 7.02 2.32 10.9l7.98-6.2z"/>
            <path fill="#34A853" d="M24 48c6.5 0 12.05-2.13 16.05-5.78l-7.03-5.44c-1.95 1.32-4.46 2.1-9.02 2.1-6.13 0-11.56-3.52-13.7-8.29l-7.98 6.2C6.48 42.56 14.62 48 24 48z"/>
          </svg>
          <span>Sign in with Google</span>
        </a>

        <div class="signup-link">
          Don't have an account? <a href="#" id="toggleToSignup">Sign up for free!</a>
        </div>

        <div id="loginMessage" class="auth-message" role="alert" aria-live="polite"></div>
      </form>

      <!-- SIGNUP -->
      <form id="signupForm" hidden>
        <div class="form-group">
          <label for="signup-username">Username</label>
          <input id="signup-username" name="username" placeholder="Choose a username" autocomplete="username" required />
        </div>

        <div class="form-group">
          <label for="signup-email">Email</label>
          <input id="signup-email" name="email" type="email" placeholder="Enter your email" autocomplete="email" required />
        </div>

        <div class="form-group">
          <label for="signup-password">Password</label>
          <input id="signup-password" name="password" type="password" placeholder="At least 8 characters" autocomplete="new-password" required />
        </div>

        <div class="form-group">
          <label for="signup-confirm">Confirm Password</label>
          <input id="signup-confirm" name="confirm" type="password" placeholder="Re-enter your password" autocomplete="new-password" required />
        </div>

        <!-- optional in backend -->
        <div class="form-group">
          <label for="signup-name">Name (optional)</label>
          <input id="signup-name" name="name" placeholder="Your name" autocomplete="name" />
        </div>

        <button class="btn-signin" type="submit">Create account</button>

        <div class="divider">
          <span>or</span>
        </div>

        <a class="btn-google" href="/oauth2/authorize/google" role="button" aria-label="Sign up with Google">
          <svg viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.2 3.6l6.86-6.86C36.05 1.99 30.5 0 24 0 14.62 0 6.48 5.44 2.32 13.39l7.98 6.2C12.44 13.02 17.87 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.5 24.5c0-1.57-.14-3.09-.41-4.55H24v9.11h12.7c-.55 2.95-2.16 5.45-4.56 7.13l7.03 5.44c4.11-3.79 6.33-9.38 6.33-17.13z"/>
            <path fill="#FBBC05" d="M10.3 28.2c-.49-1.49-.76-3.08-.76-4.7s.27-3.21.76-4.7l-7.98-6.2C.84 16.48 0 20.17 0 23.5c0 3.33.84 7.02 2.32 10.9l7.98-6.2z"/>
            <path fill="#34A853" d="M24 48c6.5 0 12.05-2.13 16.05-5.78l-7.03-5.44c-1.95 1.32-4.46 2.1-9.02 2.1-6.13 0-11.56-3.52-13.7-8.29l-7.98 6.2C6.48 42.56 14.62 48 24 48z"/>
          </svg>
          <span>Continue with Google</span>
        </a>

        <div class="signup-link">
          Already have an account? <a href="#" id="toggleToLogin">Sign in</a>
        </div>

        <div id="signupMessage" class="auth-message" role="alert" aria-live="polite"></div>
      </form>
    </div>

    <div class="right">
      <div class="athlete-wrapper">
        <!-- Replace src with the illustration you want (similar to your provided image) -->
        <svg class="athlete-svg"
          width="100%"
          viewBox="0 0 680 520"
          xmlns="http://www.w3.org/2000/svg"
          role="img"
          aria-label="Quantity measurement illustration"
          preserveAspectRatio="xMidYMid meet">

        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
                  markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
                  stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </marker>
        </defs>

        <text x="340" y="52" text-anchor="middle" font-size="22"
              font-family="sans-serif" fill="#FF073B">Quantity Measurement</text>

        <!-- ── BEAKER (Volume) ── -->
        <g transform="translate(80, 90)">
          <path d="M30 0 L30 200 Q30 220 50 220 L110 220 Q130 220 130 200 L130 0 Z"
                fill="#FF073B" fill-opacity="0.08" stroke="#FF073B" stroke-width="2"/>
          <clipPath id="beaker-clip">
            <path d="M31 0 L31 200 Q31 219 50 219 L110 219 Q129 219 129 200 L129 0 Z"/>
          </clipPath>
          <rect x="31" y="100" width="98" height="119"
                fill="#FF073B" fill-opacity="0.35" clip-path="url(#beaker-clip)"/>
          <line x1="118" y1="60"  x2="128" y2="60"  stroke="#FF073B" stroke-width="1.5"/>
          <line x1="118" y1="100" x2="128" y2="100" stroke="#FF073B" stroke-width="1.5"/>
          <line x1="118" y1="140" x2="128" y2="140" stroke="#FF073B" stroke-width="1.5"/>
          <line x1="118" y1="180" x2="128" y2="180" stroke="#FF073B" stroke-width="1.5"/>
          <text x="113" y="64"  text-anchor="end"    font-size="12" font-family="sans-serif" fill="#FF073B">400</text>
          <text x="113" y="104" text-anchor="end"    font-size="12" font-family="sans-serif" fill="#FF073B">300</text>
          <text x="113" y="144" text-anchor="end"    font-size="12" font-family="sans-serif" fill="#FF073B">200</text>
          <text x="113" y="184" text-anchor="end"    font-size="12" font-family="sans-serif" fill="#FF073B">100</text>
          <text x="80"  y="245" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#FF073B">Volume (mL)</text>
        </g>

        <!-- ── RULER (Length) ── -->
        <g transform="translate(250, 100)">
          <rect x="0" y="0" width="240" height="50" rx="6"
                fill="#FF073B" fill-opacity="0.08" stroke="#FF073B" stroke-width="2"/>
          <line x1="0"   y1="50" x2="0"   y2="28" stroke="#FF073B" stroke-width="1.5"/>
          <line x1="40"  y1="50" x2="40"  y2="28" stroke="#FF073B" stroke-width="1.5"/>
          <line x1="80"  y1="50" x2="80"  y2="28" stroke="#FF073B" stroke-width="1.5"/>
          <line x1="120" y1="50" x2="120" y2="28" stroke="#FF073B" stroke-width="1.5"/>
          <line x1="160" y1="50" x2="160" y2="28" stroke="#FF073B" stroke-width="1.5"/>
          <line x1="200" y1="50" x2="200" y2="28" stroke="#FF073B" stroke-width="1.5"/>
          <line x1="240" y1="50" x2="240" y2="28" stroke="#FF073B" stroke-width="1.5"/>
          <text x="0"   y="22" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#FF073B">0</text>
          <text x="40"  y="22" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#FF073B">1</text>
          <text x="80"  y="22" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#FF073B">2</text>
          <text x="120" y="22" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#FF073B">3</text>
          <text x="160" y="22" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#FF073B">4</text>
          <text x="200" y="22" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#FF073B">5</text>
          <text x="240" y="22" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#FF073B">6</text>
          <text x="120" y="70" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#FF073B">Length (cm)</text>
        </g>

        <!-- ── BAR CHART (Count) ── -->
        <g transform="translate(248, 195)">
          <line x1="30" y1="0"   x2="30"  y2="185" stroke="#FF073B" stroke-width="1.5"/>
          <line x1="30" y1="185" x2="250" y2="185" stroke="#FF073B" stroke-width="1.5"/>
          <rect x="45"  y="85"  width="36" height="100" rx="3" fill="#FF073B" fill-opacity="0.85"/>
          <rect x="100" y="35"  width="36" height="150" rx="3" fill="#FF073B"/>
          <rect x="155" y="110" width="36" height="75"  rx="3" fill="#FF073B" fill-opacity="0.65"/>
          <rect x="210" y="60"  width="36" height="125" rx="3" fill="#FF073B" fill-opacity="0.75"/>
          <text x="63"  y="200" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#FF073B">A</text>
          <text x="118" y="200" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#FF073B">B</text>
          <text x="173" y="200" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#FF073B">C</text>
          <text x="228" y="200" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#FF073B">D</text>
          <text x="140" y="220" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#FF073B">Quantity per group</text>
        </g>

        <!-- ── BALANCE SCALE (Mass) ── -->
        <g transform="translate(490, 90)">
          <rect x="72" y="170" width="12" height="60" rx="3" fill="#FF073B" fill-opacity="0.5"/>
          <rect x="44" y="226" width="68" height="10" rx="4" fill="#FF073B" fill-opacity="0.5"/>
          <line x1="20" y1="170" x2="136" y2="170" stroke="#FF073B" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="78" cy="170" r="6" fill="#FF073B"/>
          <line x1="20" y1="170" x2="20"  y2="190" stroke="#FF073B" stroke-width="1.5"/>
          <line x1="20" y1="170" x2="5"   y2="190" stroke="#FF073B" stroke-width="1.5"/>
          <line x1="20" y1="170" x2="35"  y2="190" stroke="#FF073B" stroke-width="1.5"/>
          <path d="M5 190 Q20 198 35 190" fill="#FF073B" fill-opacity="0.15" stroke="#FF073B" stroke-width="1.5"/>
          <line x1="136" y1="170" x2="136" y2="195" stroke="#FF073B" stroke-width="1.5"/>
          <line x1="136" y1="170" x2="121" y2="195" stroke="#FF073B" stroke-width="1.5"/>
          <line x1="136" y1="170" x2="151" y2="195" stroke="#FF073B" stroke-width="1.5"/>
          <path d="M121 195 Q136 203 151 195" fill="#FF073B" fill-opacity="0.15" stroke="#FF073B" stroke-width="1.5"/>
          <circle cx="20"  cy="186" r="7"  fill="#FF073B" fill-opacity="0.7"/>
          <rect   x="128" y="185"  width="16" height="10" rx="2" fill="#FF073B" fill-opacity="0.7"/>
          <text x="78" y="252" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#FF073B">Mass (g)</text>
        </g>

        <!-- ── Legend ── -->
        <g transform="translate(100, 410)">
          <circle cx="12"  cy="12" r="10" fill="#FF073B" fill-opacity="0.15" stroke="#FF073B" stroke-width="1.5"/>
          <text x="28"  y="17" font-size="12" font-family="sans-serif" fill="#FF073B">Volume</text>
          <circle cx="112" cy="12" r="10" fill="#FF073B" fill-opacity="0.15" stroke="#FF073B" stroke-width="1.5"/>
          <text x="128" y="17" font-size="12" font-family="sans-serif" fill="#FF073B">Length</text>
          <circle cx="222" cy="12" r="10" fill="#FF073B" fill-opacity="0.15" stroke="#FF073B" stroke-width="1.5"/>
          <text x="238" y="17" font-size="12" font-family="sans-serif" fill="#FF073B">Count</text>
          <circle cx="322" cy="12" r="10" fill="#FF073B" fill-opacity="0.15" stroke="#FF073B" stroke-width="1.5"/>
          <text x="338" y="17" font-size="12" font-family="sans-serif" fill="#FF073B">Mass</text>
        </g>

        <text x="340" y="480" text-anchor="middle" font-size="12"
              font-family="sans-serif" fill="#888">Four dimensions of physical quantity</text>

      </svg>
      </div>
	  
    </div>
  </div>

  <!-- Success Popup -->
  <div id="successPopup" class="popup hidden">
    <div class="popup-content">
      <div class="check">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 6L9 17L4 12" stroke="#E8394D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p>Login Successful!</p>
      <span>Redirecting to dashboard...</span>
    </div>
  </div>

  <script>
  (function () {
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');

    const loginMessage = document.getElementById('loginMessage');
    const signupMessage = document.getElementById('signupMessage');

    const authTitle = document.getElementById('authTitle');
    const authSubtitle = document.getElementById('authSubtitle');

    const toggleToSignup = document.getElementById('toggleToSignup');
    const toggleToLogin = document.getElementById('toggleToLogin');

    function setMode(mode) {
      const isSignup = mode === 'signup';
      signupForm.hidden = !isSignup;
      loginForm.hidden = isSignup;

      authTitle.textContent = isSignup ? 'CREATE ACCOUNT' : 'WELCOME BACK';
      authSubtitle.textContent = isSignup
        ? "Create your account to start measuring."
        : "Welcome back! Please enter your details.";

      loginMessage.textContent = '';
      signupMessage.textContent = '';
    }

    toggleToSignup.addEventListener('click', (e) => {
      e.preventDefault();
      setMode('signup');
    });

    toggleToLogin.addEventListener('click', (e) => {
      e.preventDefault();
      setMode('login');
    });

	loginForm.addEventListener('submit', function (e) {
	  e.preventDefault();

	  const popup = document.getElementById("successPopup");

	  // Show popup
	  popup.classList.remove("hidden");

	  // Redirect after 2 seconds
	  setTimeout(() => {
	    window.location.href = "dashboard.html";
	  }, 2000);
	});
	
	    signupForm.addEventListener('submit', function (e) {
	      e.preventDefault();
	      alert("Account created successfully!");
	    });
	
	  })();
	  
</script>
</body>
</html>
